<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Game | TreXanh</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/favicon/favicon-32x32.png">
<style>
    :root {
        --brand: #10b981; --brand-dk: #059669; --brand-deeper: #064e3b;
        --brand-glow: rgba(16,185,129,.22); --brand-soft: rgba(16,185,129,.08);
        --bg: #f0fdf4; --bg2: #ffffff; --text: #0f172a; --muted: #64748b; --border: #d1fae5;
    }
    @media (prefers-color-scheme: dark) {
        :root { --bg:#060d18; --bg2:#0c1a2e; --text:#ecfdf5; --muted:#6b7280; --border:rgba(16,185,129,.13); }
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .wrap { max-width: 460px; margin: 0 auto; padding: 20px 16px 60px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .topbar a { color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .topbar h1 { font-size: 16px; font-weight: 900; margin: 0; display: flex; align-items: center; gap: 6px; }

    .card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; }

    /* Login screen */
    .login-screen { text-align: center; padding: 60px 20px; }
    .login-screen .emoji { font-size: 56px; margin-bottom: 12px; }
    .login-screen h2 { font-size: 18px; margin: 0 0 8px; }
    .login-screen p { font-size: 13px; color: var(--muted); margin: 0 0 24px; line-height: 1.6; }
    .btn-google {
        display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px;
        background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px;
        font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer;
        box-shadow: 0 4px 16px var(--brand-glow);
    }
    .btn-google:hover { border-color: var(--brand); }

    /* Pet display */
    .pet-hero { text-align: center; padding: 8px 0 4px; }
    .pet-icon { font-size: 72px; line-height: 1; margin-bottom: 6px; }
    .pet-name { font-size: 17px; font-weight: 900; margin: 0 0 2px; }
    .pet-level { font-size: 11px; font-weight: 700; color: var(--brand); }

    .bar-row { margin-top: 12px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
    .bar-track { height: 8px; border-radius: 999px; background: var(--brand-soft); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width .3s; }
    .bar-fill.xp { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .bar-fill.hunger { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bar-fill.happiness { background: linear-gradient(90deg, #ec4899, #f472b6); }
    .bar-fill.energy { background: linear-gradient(90deg, #10b981, #34d399); }

    .actions-row { display: flex; gap: 8px; margin-top: 16px; }
    .actions-row button {
        flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border);
        background: var(--bg); color: var(--text); font-size: 12px; font-weight: 800;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .actions-row button:hover { border-color: var(--brand); }
    .actions-row button:disabled { opacity: .4; cursor: not-allowed; }

    .inv-badge {
        display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800;
        background: var(--brand-soft); color: var(--brand); padding: 3px 9px; border-radius: 999px;
    }

    .sec-title { font-size: 12px; font-weight: 900; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }

    select, .quiz-opt {
        width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--bg); color: var(--text); font-size: 13px;
    }

    .btn-main {
        width: 100%; padding: 12px; border-radius: 12px; border: none;
        background: var(--brand); color: white; font-size: 13px; font-weight: 800; cursor: pointer;
    }
    .btn-main:hover { background: var(--brand-dk); }
    .btn-main:disabled { opacity: .5; cursor: not-allowed; }

    .quiz-q { margin-bottom: 16px; }
    .quiz-q p { font-size: 13px; font-weight: 700; margin: 0 0 8px; }
    .quiz-opt { display: block; margin-bottom: 6px; cursor: pointer; font-size: 12.5px; }
    .quiz-opt input { margin-right: 6px; }

    .toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--text); color: var(--bg2); padding: 10px 18px; border-radius: 12px;
        font-size: 12.5px; font-weight: 700; z-index: 999; opacity: 0; pointer-events: none;
        transition: opacity .2s;
    }
    .toast.show { opacity: 1; }

    .muted-note { font-size: 10.5px; color: var(--muted); line-height: 1.6; margin-top: 8px; }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: .001ms !important; }
    }
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <h1>🐾 Pet Game</h1>
        <a href="/index.html">← TreXanh</a>
    </div>

    <div id="appRoot">
        <div class="card"><p style="text-align:center;color:var(--muted);font-size:12px">Đang tải...</p></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const appRoot = document.getElementById('appRoot');
const toastEl = document.getElementById('toast');

function toast(msg, ms = 2500) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.remove('show'), ms);
}

function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
}

/* 1. Lấy config Supabase từ server (không hardcode key trong code) */
let supabase;
async function initSupabase() {
    const res = await fetch('/api/config');
    if (!res.ok) {
        appRoot.innerHTML = '<div class="card"><p style="color:#ef4444;font-size:12px">' +
            'Server chưa cấu hình Supabase. Xem hướng dẫn set biến môi trường trên Vercel.</p></div>';
        throw new Error('config not ready');
    }
    const { supabaseUrl, supabaseAnonKey } = await res.json();
    supabase = createClient(supabaseUrl, supabaseAnonKey);
}

/* 2. Màn hình đăng nhập */
function renderLogin() {
    appRoot.innerHTML = `
        <div class="card login-screen">
            <div class="emoji">🌱</div>
            <h2>Nuôi pet bằng việc học!</h2>
            <p>Đăng nhập để bắt đầu nuôi pet của riêng bạn.<br>Xem câu hỏi trên TreXanh mỗi ngày để pet lớn lên.</p>
            <button class="btn-google" id="btnGoogleLogin">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-2.1 14.1-5.6l-6.5-5.5C29.6 34.5 26.9 35.5 24 35.5c-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.5 5.5C41.5 36.3 44 30.6 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
                Đăng nhập bằng Google
            </button>
        </div>`;
    document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.href } });
    });
}

/* 3. Màn hình tạo pet (user mới, chưa có pet) */
function renderCreatePet() {
    appRoot.innerHTML = `
        <div class="card login-screen">
            <div class="emoji">🌱</div>
            <h2>Tạo pet đầu tiên của bạn</h2>
            <p>Đây sẽ là người bạn đồng hành trong suốt quá trình học nhé!</p>
            <input type="text" id="petNameInput" placeholder="Đặt tên cho pet..." maxlength="30"
                   style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:14px;text-align:center">
            <button class="btn-main" id="btnCreatePet">🌱 Tạo pet</button>
        </div>`;
    document.getElementById('btnCreatePet').addEventListener('click', async () => {
        const name = document.getElementById('petNameInput').value.trim() || 'Pet của tôi';
        const btn = document.getElementById('btnCreatePet');
        btn.disabled = true; btn.textContent = 'Đang tạo...';
        const { error } = await supabase.rpc('rpc_create_starter_pet', { p_species_id: 'bamboo_sprite', p_name: name });
        if (error) {
            toast('Lỗi tạo pet: ' + error.message, 3500);
            btn.disabled = false; btn.textContent = '🌱 Tạo pet';
            return;
        }
        await loadApp();
    });
}

/* 4. Màn hình chính: hiện pet + kho đồ + thi + quảng cáo */
let currentPet = null;
let currentInventory = { food: 0, toy: 0 };
let currentSession = null;

async function renderMain() {
    const species = await supabase.from('pet_species').select('*').eq('id', currentPet.species_id).single();
    const icon = species.data?.icon || '🌱';
    const xpInLevel = currentPet.xp % 100;

    appRoot.innerHTML = `
        <div class="card">
            <div class="pet-hero">
                <div class="pet-icon">${icon}</div>
                <p class="pet-name">${escapeHtml(currentPet.name)}</p>
                <p class="pet-level">Level ${currentPet.level} · ${escapeHtml(species.data?.name || '')}</p>
            </div>

            <div class="bar-row">
                <div class="bar-label"><span>⭐ XP</span><span>${xpInLevel}/100</span></div>
                <div class="bar-track"><div class="bar-fill xp" style="width:${xpInLevel}%"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-label"><span>🍚 No bụng</span><span>${currentPet.hunger}%</span></div>
                <div class="bar-track"><div class="bar-fill hunger" style="width:${currentPet.hunger}%"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-label"><span>💖 Vui vẻ</span><span>${currentPet.happiness}%</span></div>
                <div class="bar-track"><div class="bar-fill happiness" style="width:${currentPet.happiness}%"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-label"><span>⚡ Năng lượng</span><span>${currentPet.energy}%</span></div>
                <div class="bar-track"><div class="bar-fill energy" style="width:${currentPet.energy}%"></div></div>
            </div>

            <div class="actions-row">
                <button id="btnFeed" ${currentInventory.food < 1 ? 'disabled' : ''}>🍚 Cho ăn <span class="inv-badge">${currentInventory.food}</span></button>
                <button id="btnPlay" ${currentInventory.toy < 1 ? 'disabled' : ''}>🎾 Chơi <span class="inv-badge">${currentInventory.toy}</span></button>
            </div>
            <p class="muted-note">Xem câu hỏi trên trang chính TreXanh mỗi ngày để nhận XP cho pet (mỗi câu chỉ tính 1 lần/ngày).</p>
        </div>

        <div class="card">
            <p class="sec-title">📝 Thi lấy thức ăn <span class="inv-badge">tối đa 3/ngày</span></p>
            <select id="quizCategorySelect">
                <option value="HHT">TBT Hà Huy Tập</option>
                <option value="LLCT">Lý Luận Chính Trị</option>
            </select>
            <button class="btn-main" id="btnStartQuiz" style="margin-top:10px">Bắt đầu thi (5 câu)</button>
            <div id="quizArea" style="margin-top:14px"></div>
        </div>

        <div class="card">
            <p class="sec-title">📺 Xem quảng cáo lấy vật phẩm <span class="inv-badge">tối đa 3/loại/ngày</span></p>
            <div class="actions-row">
                <button id="btnAdFood">🍚 Xem QC → Đồ ăn</button>
                <button id="btnAdToy">🎾 Xem QC → Đồ chơi</button>
            </div>
        </div>

        <button class="btn-main" id="btnLogout" style="background:transparent;color:var(--muted);border:1.5px solid var(--border)">Đăng xuất</button>
    `;

    document.getElementById('btnFeed').addEventListener('click', () => doAction('rpc_feed_pet', 'Đã cho ăn! 🍚'));
    document.getElementById('btnPlay').addEventListener('click', () => doAction('rpc_play_pet', 'Chơi vui ghê! 🎾'));
    document.getElementById('btnStartQuiz').addEventListener('click', startQuiz);
    document.getElementById('btnAdFood').addEventListener('click', () => claimAd('food'));
    document.getElementById('btnAdToy').addEventListener('click', () => claimAd('toy'));
    document.getElementById('btnLogout').addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
}

async function doAction(rpcName, successMsg) {
    const { data, error } = await supabase.rpc(rpcName, { p_pet_id: currentPet.id });
    if (error) {
        const msg = error.message.includes('not_enough') ? 'Không đủ vật phẩm!' : 'Có lỗi xảy ra, thử lại nhé';
        toast(msg);
        return;
    }
    currentPet = data;
    await refreshInventory();
    toast(successMsg);
    await renderMain();
}

async function refreshInventory() {
    const { data } = await supabase.from('inventory_items').select('item_type, quantity').eq('user_id', currentPet.user_id);
    currentInventory = { food: 0, toy: 0 };
    (data || []).forEach(row => { currentInventory[row.item_type] = row.quantity; });
}

/* Quiz flow */
async function startQuiz() {
    const category = document.getElementById('quizCategorySelect').value;
    const quizArea = document.getElementById('quizArea');
    quizArea.innerHTML = '<p style="font-size:12px;color:var(--muted)">Đang tải câu hỏi...</p>';

    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch('/api/quiz/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ category }),
    });
    const data = await res.json();
    if (!res.ok) { quizArea.innerHTML = `<p style="color:#ef4444;font-size:12px">${escapeHtml(data.error || 'Lỗi tải đề')}</p>`; return; }

    currentSession = { quizToken: data.quizToken, total: data.questions.length };

    quizArea.innerHTML = data.questions.map((q, qi) => `
        <div class="quiz-q">
            <p>${qi + 1}. ${escapeHtml(q.question)}</p>
            ${q.options.map((opt, oi) => `
                <label class="quiz-opt">
                    <input type="radio" name="q${qi}" value="${oi}"> ${escapeHtml(opt)}
                </label>
            `).join('')}
        </div>
    `).join('') + '<button class="btn-main" id="btnSubmitQuiz">Nộp bài</button>';

    document.getElementById('btnSubmitQuiz').addEventListener('click', () => submitQuiz(data.questions.length));
}

async function submitQuiz(total) {
    const chosenAnswers = [];
    for (let i = 0; i < total; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        chosenAnswers.push(checked ? parseInt(checked.value, 10) : -1);
    }

    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch('/api/quiz/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ quizToken: currentSession.quizToken, chosenAnswers }),
    });
    const result = await res.json();
    const quizArea = document.getElementById('quizArea');

    if (!res.ok) { quizArea.innerHTML = `<p style="color:#ef4444;font-size:12px">${escapeHtml(result.error || 'Lỗi')}</p>`; return; }

    quizArea.innerHTML = `<p style="font-size:13px;font-weight:700">
        Đúng ${result.correct}/${result.total} — ${result.passed ? '🎉 Đạt!' : '😅 Chưa đạt'}
        ${result.awarded ? '<br>+1 🍚 đồ ăn!' : `<br><span style="color:var(--muted);font-size:11px">${escapeHtml(result.reason || '')}</span>`}
    </p>`;

    if (result.awarded) { await refreshInventory(); await renderMain(); }
}

/* Ad claim (xem TODO trong api/ads/claim.js về giới hạn hiện tại) */
async function claimAd(rewardType) {
    /* TODO: gắn rewarded ad SDK thật ở đây trước khi gọi claim — hiện tại
       gọi thẳng để demo luồng, CHƯA xác minh đã xem quảng cáo thật */
    toast('Đang tải quảng cáo... (demo — chưa gắn SDK thật)');

    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch('/api/ads/claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ rewardType }),
    });
    const result = await res.json();
    if (result.awarded) {
        toast(`+1 ${rewardType === 'toy' ? '🎾 đồ chơi' : '🍚 đồ ăn'}!`);
        await refreshInventory();
        await renderMain();
    } else {
        toast(result.reason || 'Không nhận được thưởng');
    }
}

/* Bootstrap */
async function loadApp() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { renderLogin(); return; }

    const { data: pet } = await supabase.from('pets').select('*').eq('user_id', user.id).maybeSingle();
    if (!pet) { renderCreatePet(); return; }

    currentPet = pet;
    await refreshInventory();
    await renderMain();
}

(async () => {
    await initSupabase();
    supabase.auth.onAuthStateChange((_event) => { loadApp(); });
    await loadApp();
})();
</script>
</body>
</html>
