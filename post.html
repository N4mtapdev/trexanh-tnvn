/* Lấy slug từ URL */
var slug = new URLSearchParams(location.search).get('slug') || '';

/* Tìm bài theo slug — hoàn toàn offline, không fetch */
var post = POSTS_DB.find(function(p) { return p.slug === slug; });

if (!post) {
    document.getElementById('post-skeleton').style.display = 'none';
    document.getElementById('post-notfound').style.display = 'block';
} else {
    renderPost(post);
}


function renderPost(p) {
    var col = CAT_COLORS[p.catColor] || CAT_COLORS.emerald;

    /* Cập nhật SEO meta động */
    TreXanh.setMeta({
        title:       p.title,
        description: p.excerpt,
        image:       p.thumb ? 'https://trexanh-tnvn.vercel.app/' + p.thumb : undefined,
        url:         'https://trexanh-tnvn.vercel.app/post.html?slug=' + p.slug
    });

    /* Breadcrumb title */
    var bc = document.getElementById('tx-bc-title');
    if (bc) bc.textContent = p.title.substring(0, 28) + (p.title.length > 28 ? '…' : '');

    /* Schema Article */
    var schema = document.getElementById('schema-article');
    if (schema) {
        schema.textContent = JSON.stringify({
            '@context':'https://schema.org', '@type':'Article',
            'headline': p.title, 'description': p.excerpt,
            'author':{'@type':'Person','name':p.author},
            'datePublished': p.date,
            'publisher':{'@type':'Organization','name':'TreXanh Developer','logo':{'@type':'ImageObject','url':'https://trexanh-tnvn.vercel.app/assets/images/logo.png'}},
            'inLanguage':'vi-VN',
            'image': p.thumb ? 'https://trexanh-tnvn.vercel.app/' + p.thumb : undefined
        });
    }

    /* Thumb */
    if (p.thumb) {
        document.getElementById('post-thumb-wrap').style.display = 'block';
        document.getElementById('post-thumb').src = p.thumb;
        document.getElementById('post-thumb').alt = p.title;
    }

    /* Category badge */
    var cb = document.getElementById('post-cat-badge');
    cb.textContent         = p.catLabel;
    cb.style.background    = col.bg;
    cb.style.color         = col.text;

    /* Featured */
    if (p.featured) document.getElementById('post-featured-badge').style.display = 'inline-flex';

    /* Title */
    document.getElementById('post-title').textContent = p.title;

    /* Meta */
    document.getElementById('post-author').innerHTML =
        '<i class="bi bi-person-circle" style="color:#10b981"></i> ' + p.author;
    document.getElementById('post-date').innerHTML =
        '<i class="bi bi-calendar3" style="color:#3b82f6"></i> ' + TreXanh.relativeTime(p.date);
    document.getElementById('post-time').innerHTML =
        '<i class="bi bi-clock" style="color:#8b5cf6"></i> ' + p.readTime;

    /* Content */
    document.getElementById('post-content').innerHTML = p.content || '';

    /* Tags */
    document.getElementById('post-tags').innerHTML = (p.tags || []).map(function(t) {
        return '<span style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);color:var(--muted)"><i class="bi bi-hash" style="font-size:9px"></i>' + t + '</span>';
    }).join('');

    /* Related posts — lấy từ POSTS_DB, bỏ bài hiện tại */
    var related = POSTS_DB.filter(function(x) { return x.slug !== p.slug; }).slice(0, 3);
    document.getElementById('related-posts').innerHTML = related.map(function(r) {
        var rc = CAT_COLORS[r.catColor] || CAT_COLORS.emerald;
        return '<a href="post.html?slug=' + r.slug + '" class="related-card">' +
            '<div style="width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:' + rc.bg + '">' +
                '<i class="bi bi-file-earmark-text-fill" style="font-size:16px;color:' + rc.text + '"></i>' +
            '</div>' +
            '<div style="flex:1;min-width:0">' +
                '<p style="font-size:11px;font-weight:800;color:var(--text);margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + r.title + '</p>' +
                '<p style="font-size:9px;font-weight:700;color:var(--muted);margin:0;display:flex;align-items:center;gap:5px"><span style="color:' + rc.text + '">' + r.catLabel + '</span><span>·</span>' + r.readTime + '</p>' +
            '</div>' +
            '<i class="bi bi-chevron-right" style="color:var(--muted);font-size:12px;flex-shrink:0"></i>' +
        '</a>';
    }).join('');

    /* Ẩn skeleton, hiện bài */
    document.getElementById('post-skeleton').style.display = 'none';
    document.getElementById('post-body').style.display     = 'block';
}


function sharePost(type) {
    var url   = location.href;
    var title = document.title;
    if (type === 'copy') {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(function() {
                TreXanh.toast('success', '✅ Đã copy link bài viết!');
            }).catch(function() {
                TreXanh.toast('error', 'Không thể copy');
            });
        }
    }
    if (type === 'native') {
        if (navigator.share) {
            navigator.share({ title: title, url: url }).catch(function() {});
        } else if (navigator.clipboard) {
            navigator.clipboard.writeText(url);
            TreXanh.toast('info', '📋 Đã copy link để chia sẻ');
        }
    }
}

}); // end window.addEventListener('load')
</script>
