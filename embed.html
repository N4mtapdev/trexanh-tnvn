<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>TreXanh — Widget tra cứu</title>
<!--
    Trang widget để NHÚNG qua <iframe> vào website/blog khác.
    Cách dùng:
        <iframe src="https://trexanh-tnvn.vercel.app/embed.html"
                width="100%" height="480" style="border:0;border-radius:16px"
                loading="lazy" title="TreXanh — Tra cứu đáp án TNVN"></iframe>

    Vì sao an toàn khi nhúng ở site khác:
    - Iframe khác-origin: trang nhúng KHÔNG đọc được DOM/JS bên trong khung
      này (same-origin policy của trình duyệt chặn hoàn toàn), nên không copy
      được logic/code thật của TreXanh qua iframe.
    - Trang này CHỈ chứa 1 ô tìm kiếm + kết quả — không lộ thêm gì so với
      việc mở thẳng trang chính, chỉ gọn hơn để nhúng.
    - Chỉ RIÊNG trang này được phép nhúng cross-origin (xem "Content-Security-
      Policy: frame-ancestors" cho path /embed.html trong vercel.json) — toàn
      bộ các trang còn lại của site vẫn bị chặn nhúng (chống clickjacking).
-->
<style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: transparent;
    }
    body { padding: 14px; color: #0f172a; }

    .tx-embed-search {
        display: flex; align-items: center; gap: 8px;
        background: #f0fdf4; border: 1.5px solid #d1fae5; border-radius: 12px;
        padding: 10px 14px; margin-bottom: 10px;
    }
    .tx-embed-search input {
        flex: 1; border: none; background: transparent; outline: none;
        font-size: 14px; color: #0f172a;
    }
    .tx-embed-search input::placeholder { color: #94a3b8; }
    .tx-embed-icon { color: #10b981; font-size: 15px; flex-shrink: 0; }

    .tx-embed-results { max-height: 360px; overflow-y: auto; }
    .tx-embed-empty {
        text-align: center; padding: 24px 8px; color: #94a3b8; font-size: 12px;
    }
    .tx-embed-item {
        background: #ffffff; border: 1px solid #f1f5f9; border-radius: 10px;
        padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
        transition: border-color .15s;
    }
    .tx-embed-item:hover { border-color: #10b981; }
    .tx-embed-q {
        font-size: 12.5px; font-weight: 700; color: #0f172a; margin: 0 0 4px; line-height: 1.4;
    }
    .tx-embed-a {
        font-size: 12px; color: #059669; font-weight: 600; margin: 0; line-height: 1.4;
        display: none;
    }
    .tx-embed-item.open .tx-embed-a { display: block; }
    .tx-embed-badge {
        display: inline-block; font-size: 9px; font-weight: 800; color: #059669;
        background: rgba(16,185,129,.1); border-radius: 5px; padding: 1px 6px; margin-bottom: 5px;
    }

    .tx-embed-footer {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9;
    }
    .tx-embed-brand {
        display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; color: #64748b;
        text-decoration: none;
    }
    .tx-embed-brand span { color: #10b981; }
    .tx-embed-link {
        font-size: 10px; font-weight: 700; color: #10b981; text-decoration: none;
        display: flex; align-items: center; gap: 4px;
    }
    .tx-embed-link:hover { text-decoration: underline; }

    @media (prefers-color-scheme: dark) {
        body { color: #ecfdf5; }
        .tx-embed-search { background: #0c1a2e; border-color: rgba(16,185,129,.2); }
        .tx-embed-search input { color: #ecfdf5; }
        .tx-embed-item { background: #0c1a2e; border-color: rgba(255,255,255,.06); }
        .tx-embed-q { color: #ecfdf5; }
        .tx-embed-footer { border-color: rgba(255,255,255,.06); }
        .tx-embed-brand { color: #94a3b8; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: .001ms !important; }
    }
</style>
</head>
<body>

    <div class="tx-embed-search">
        <i class="tx-embed-icon">🔍</i>
        <input type="text" id="txEmbedInput" placeholder="Tìm câu hỏi, từ khóa..." autocomplete="off">
    </div>

    <div class="tx-embed-results" id="txEmbedResults">
        <p class="tx-embed-empty">Gõ từ khóa để tìm câu hỏi &amp; đáp án</p>
    </div>

    <div class="tx-embed-footer">
        <a class="tx-embed-brand" href="https://trexanh-tnvn.vercel.app/" target="_blank" rel="noopener">
            🌿 <span>TreXanh</span> TNVN
        </a>
        <a class="tx-embed-link" href="https://trexanh-tnvn.vercel.app/" target="_blank" rel="noopener">
            Xem đầy đủ →
        </a>
    </div>

<script>
(function () {
    'use strict';

    const CATEGORIES = ['HHT', 'LLCT']; /* đồng bộ thủ công với scripts/build-data.js */
    const input   = document.getElementById('txEmbedInput');
    const results = document.getElementById('txEmbedResults');

    let allItems = null; /* lazy-load — chỉ fetch khi người dùng gõ lần đầu */
    let loading  = false;

    async function ensureLoaded() {
        if (allItems || loading) return;
        loading = true;
        try {
            const lists = await Promise.all(CATEGORIES.map(async (cat) => {
                try {
                    const res = await fetch(`/api/data?cat=${cat}`);
                    if (!res.ok) return [];
                    const data = await res.json();
                    return data.map(item => ({
                        q: (item.question || item.q || '').trim(),
                        a: (item.answer   || item.a || '').trim(),
                        cat,
                    })).filter(i => i.q && i.a);
                } catch { return []; }
            }));
            allItems = lists.flat();
        } finally {
            loading = false;
        }
    }

    function escapeHtml(str) {
        return String(str ?? '').replace(/[&<>"']/g, (c) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[c]));
    }

    function render(query) {
        if (!query) {
            results.innerHTML = '<p class="tx-embed-empty">Gõ từ khóa để tìm câu hỏi &amp; đáp án</p>';
            return;
        }
        if (!allItems) {
            results.innerHTML = '<p class="tx-embed-empty">Đang tải dữ liệu...</p>';
            return;
        }

        const q = query.toLowerCase();
        const matches = allItems.filter(i => i.q.toLowerCase().includes(q)).slice(0, 15);

        if (matches.length === 0) {
            results.innerHTML = `<p class="tx-embed-empty">Không tìm thấy câu nào khớp với "${escapeHtml(query)}"</p>`;
            return;
        }

        results.innerHTML = matches.map((item, i) => `
            <div class="tx-embed-item" data-i="${i}">
                <span class="tx-embed-badge">${escapeHtml(item.cat)}</span>
                <p class="tx-embed-q">${escapeHtml(item.q)}</p>
                <p class="tx-embed-a">💡 ${escapeHtml(item.a)}</p>
            </div>
        `).join('');

        results.querySelectorAll('.tx-embed-item').forEach((el, i) => {
            el.addEventListener('click', () => el.classList.toggle('open'));
        });
    }

    let debounceTimer;
    input.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        clearTimeout(debounceTimer);
        if (query) await ensureLoaded();
        debounceTimer = setTimeout(() => render(query), 200);
    });

    input.addEventListener('focus', () => { ensureLoaded(); }, { once: true });
})();
</script>
</body>
</html>
